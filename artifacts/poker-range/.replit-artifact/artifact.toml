kind = "web"
previewPath = "/"
title = "Poker Range Visualizer"
version = "1.0.0"
id = "artifacts/poker-range"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21508

[services.development]
run = "pnpm --filter @workspace/poker-range run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poker-range", "run", "build" ]
publicDir = "artifacts/poker-range/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21508"
BASE_PATH = "/"
